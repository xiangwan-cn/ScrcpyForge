name: Build Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: pyinstaller --clean --noconfirm scrcpy_forge.spec

      - name: Prepare release package
        run: |
          mkdir ScrcpyForge\scrcpy_script
          copy dist\scrcpy_forge.exe ScrcpyForge\
          copy scrcpy_script\scrcpy_config.conf ScrcpyForge\
          xcopy /E /I scrcpy_script\scripts ScrcpyForge\scrcpy_script\scripts
          mkdir ScrcpyForge\templates

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrcpyForge
          path: ScrcpyForge/

      - name: Zip release
        run: Compress-Archive -Path ScrcpyForge -DestinationPath ScrcpyForge.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ScrcpyForge.zip
