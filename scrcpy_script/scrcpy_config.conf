# ── ScrcpyScript Configuration ──────────────────────────────────
# Format: key=value, # for comments
# Edit this file to change scrcpy server parameters.
# Changes take effect on next device connection — no rebuild needed.

# Video codec: h264, h265, av1 (h265/av1 require device support)
video_codec=h265

# Max dimension of the video stream (longer side).
# 0 = no limit (original resolution).
# Lower values reduce bandwidth but lower video quality.
max_size=1280

# Video bitrate in bits/sec
bit_rate=8000000

# Max frames per second (0 = unlimited)
max_fps=60

# Enable audio forwarding (true/false)
audio=false

# Enable control (touch/key injection)
control=true

# Video source: display or camera
video_source=display

# Keep device screen on while connected
stay_awake=true

# Turn device screen off on connection
turn_screen_off=true

# Turn screen off when scrcpy window closed
power_off_on_close=false

# Downsize video on MediaCodec error (instead of failing)
downsize_on_error=false

# Show touch feedback on device screen
show_touches=false

# Skip server cleanup on exit (leave jar on device)
no_cleanup=false

# Codec-specific options (e.g., "profile=1,level=2" for H.264)
codec_options=

# ── Connection ──────────────────────────────────────────────────

# Starting port for device forwarding (each device gets port, port+1, ...)
port_start=27183

# Maximum port (inclusive) for device forwarding
port_end=27282

# Maximum concurrent device sessions
max_devices=10

# ADB binary path override (empty = auto-detect in PATH)
adb_path=

# ── Paths (relative to scrcpy_script executable) ─────────────────

# scrcpy-server jar filename (looked up relative to bin/../third_party/)
server_jar=scrcpy-server-v4.0.jar

# Lua scripts directory
scripts_dir=scrcpy_script/scripts

# Template images directory (relative to scripts_dir)
templates_dir=templates
